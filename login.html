<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MyLinks - Organize e compartilhe todos os seus links em um só lugar">
    <meta name="theme-color" content="#667eea">
    <title>MyLinks - Login</title>
    <link rel="stylesheet" href="/css/index.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <main role="main">
        <div id="loginContainer">
            <h1>MyLinks</h1>
            <h2>Entrar na sua conta</h2>
            <form id="loginForm" aria-label="Formulário de login">
                <label for="email">E-mail</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="Digite seu e-mail" 
                    autocomplete="email"
                    required 
                    aria-required="true">
                
                <label for="senha">Senha</label>
                <input 
                    type="password" 
                    id="senha" 
                    name="password"
                    placeholder="Digite sua senha" 
                    autocomplete="current-password"
                    required 
                    aria-required="true">
                
                <button type="submit" aria-label="Entrar na conta">Entrar</button>
                <div class="Logloader" id="Logloader" role="status" aria-label="Entrando"></div>
            </form>

            <div class="divider-container">
                <span>ou</span>
            </div>

            <div class="google-signin-container">
                <div id="google-signin-button"></div>
            </div>
            
            <p>
                Não tem conta?
                <a href="register.html">Cadastre-se aqui</a>
            </p>
            <div id="mensagem" role="alert" aria-live="polite"></div>
        </div>
    </main>

    <script src="/js/storage.js"></script>
    <script src="/js/network.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/googleAuth.js"></script>
</body>
</html>
